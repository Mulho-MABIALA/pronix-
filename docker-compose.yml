version: '3.9'

services:
  # ─── Base de données PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: statsfoot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: statistique_foot
      POSTGRES_USER: ${DB_USER:-statsfoot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-statsfoot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Express ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: statsfoot_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-statsfoot}:${DB_PASSWORD:-changeme}@postgres:5432/statistique_foot
      NODE_ENV: production
      PORT: 5000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY}
      FOOTBALL_API_HOST: api-football-v1.p.rapidapi.com
      WAVE_API_KEY: ${WAVE_API_KEY}
      WAVE_WEBHOOK_SECRET: ${WAVE_WEBHOOK_SECRET}
      CINETPAY_API_KEY: ${CINETPAY_API_KEY}
      CINETPAY_SITE_ID: ${CINETPAY_SITE_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "5000:5000"
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  # ─── Frontend React (Nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: statsfoot_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
